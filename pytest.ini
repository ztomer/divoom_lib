[pytest]
pythonpath = .
asyncio_mode = auto
# archive/ is the retired Python daemon (commit 046cdf8), kept for reference
# only and never meant to run. Its conftest re-registers --run-hardware, which
# collides with tests/conftest.py and aborts the whole collection. Exclude the
# tree so `pytest` (and CI) never descends into it.
addopts = --ignore=archive
norecursedirs = archive
