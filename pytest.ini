[pytest]
pythonpath = .
asyncio_mode = auto
# archive/ is the retired Python daemon (commit 046cdf8), kept for reference
# only and never meant to run. Its conftest re-registers --run-hardware, which
# collides with tests/conftest.py and aborts the whole collection. Exclude the
# tree so `pytest` (and CI) never descends into it.
# .claude/worktrees/ holds other agent sessions' git worktrees on shared dev
# machines — full copies of tests/, scripts/, divoomd/, each with the same
# module basenames as the real tree, which aborts collection with an "import
# file mismatch" the moment more than one worktree exists locally. CI never
# has this directory, but local runs on this shared-tree project regularly
# do.
addopts = --ignore=archive --ignore=.claude
norecursedirs = archive .claude
