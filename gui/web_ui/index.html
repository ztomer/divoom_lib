<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        window.__js_errors = [];
        window.onerror = function(message, source, lineno, colno, error) {
            window.__js_errors.push({message: message, source: source, line: lineno, col: colno, stack: error ? error.stack : ""});
            return false;
        };
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divoom Desktop Controller & Wall Dashboard</title>
    <!-- Modern Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <!-- 1. PREMIUM CUSTOM INTEGRATED WINDOW APPBAR -->
    <header class="integrated-appbar">
        <div class="appbar-window-controls">
            <button id="win-close" class="win-btn close" title="CloseApp">×</button>
            <button id="win-min" class="win-btn min" title="MinimizeWindow">—</button>
            <button id="win-max" class="win-btn max" title="ToggleFullscreen">▢</button>
        </div>
        <!-- Active device selector + connection indicator -->
        <div class="appbar-device">
            <select id="sidebar-device-select" class="custom-select appbar-device-select" style="width: 300px !important; min-width: 300px !important; height: 32px !important; padding: 0 28px 0 12px !important; line-height: 30px !important; box-sizing: border-box !important; flex-shrink: 0 !important;">
                <option value="">Select Screen…</option>
            </select>
        </div>
        
        <!-- Global Brightness Slider in Appbar -->
        <div class="appbar-brightness">
            <svg class="kare-icon" viewBox="0 0 16 16">
                <circle cx="8" cy="8" r="3" fill="currentColor"/>
                <path d="M8,1 L8,3 M8,13 L8,15 M1,8 L3,8 M13,8 L15,8 M3,3 L4.5,4.5 M11.5,11.5 L13,13 M3,13 L4.5,11.5 M11.5,4.5 L13,3" stroke="currentColor" stroke-width="2"/>
            </svg>
            <input type="range" id="global-brightness-slider" min="0" max="100" value="80" class="appbar-slider" title="Global Brightness">
            <span id="global-brightness-value">80%</span>
        </div>

        <div class="appbar-drag-spacer"></div>

        <!-- Connection Transports in Appbar -->
        <div class="appbar-transports">
            <span class="transport-dot inactive" id="tr-ble-dot" style="background:#3b82f6; color:#3b82f6;" title="Bluetooth - Disconnected"></span>
            <span class="transport-dot inactive" id="tr-lan-dot" style="background:#22c55e; color:#22c55e;" title="Local Network - No IP set"></span>
            <span class="transport-dot inactive" id="tr-cloud-dot" style="background:#f59e0b; color:#f59e0b;" title="Divoom Cloud - Not signed in"></span>
            <span class="transport-dot active" id="tr-ext-dot" style="background:#ef4444; color:#ef4444;" title="Public Cloud - Available"></span>
        </div>
    </header>

    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <button class="nav-btn active" data-tab="control-panel">
                    <span class="btn-icon">
                        <svg class="kare-icon" viewBox="0 0 16 16">
                            <rect x="1" y="4" width="14" height="8" rx="2"/>
                            <rect x="4" y="7" width="3" height="1"/>
                            <rect x="5" y="6" width="1" height="3"/>
                            <circle cx="10" cy="8" r="1"/>
                            <circle cx="12" cy="8" r="1"/>
                        </svg>
                    </span> Channels
                </button>
                <button class="nav-btn" data-tab="display-wall">
                    <span class="btn-icon">
                        <svg class="kare-icon" viewBox="0 0 16 16">
                            <rect x="1" y="1" width="14" height="11" rx="1"/>
                            <rect x="3" y="3" width="10" height="7" fill="none" stroke="currentColor" stroke-width="1"/>
                            <rect x="6" y="12" width="4" height="2"/>
                            <rect x="4" y="14" width="8" height="1"/>
                        </svg>
                    </span> Virtual Wall
                </button>
                <button class="nav-btn" data-tab="monthly-best">
                    <span class="btn-icon">
                        <svg class="kare-icon" viewBox="0 0 16 16">
                            <path d="M8,1 C8,1 11,4 11,7 C11,10 8,15 8,15 C8,15 5,10 5,7 C5,4 8,1 8,1 Z"/>
                            <path d="M8,4 C8,4 9.5,6 9.5,7.5 C9.5,9.5 8,12 8,12 C8,12 6.5,9.5 6.5,7.5 C6.5,6 8,4 8,4 Z" fill="var(--bg-base)"/>
                        </svg>
                    </span> Monthly Best
                </button>
                <button class="nav-btn" data-tab="data-sources">
                    <span class="btn-icon">
                        <svg class="kare-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="1" y1="15" x2="15" y2="15"/>
                            <line x1="1" y1="1" x2="1" y2="15"/>
                            <path d="M2,12 L6,8 L10,10 L14,3"/>
                        </svg>
                    </span> Live Widgets
                </button>
                <button class="nav-btn" data-tab="settings">
                    <span class="btn-icon">
                        <svg class="kare-icon" viewBox="0 0 16 16">
                            <path d="M8,6 C6.9,6 6,6.9 6,8 C6,9.1 6.9,10 8,10 C9.1,10 10,9.1 10,8 C10,6.9 9.1,6 8,6 Z M8,0 L6,3 L10,3 Z M8,16 L10,13 L6,13 Z M0,8 L3,6 L3,10 Z M16,8 L13,10 L13,6 Z"/>
                        </svg>
                    </span> Settings
                </button>
            </nav>
        </aside>
        
        <main class="main-content">
            
            <!-- TAB 1: CONTROL CENTER -->
            <section id="control-panel" class="tab-content active">
                <!-- Connected Device Info Banner -->
                <div class="device-banner glass-card" id="connected-device-banner">
                    <span class="transport-badge ble card-transport-badge">
                        <svg class="kare-icon" viewBox="0 0 16 16" style="margin-right: 4px;">
                            <path d="M5,4 L11,9.5 L8,12 L8,1 L11,3.5 L5,9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="miter"/>
                        </svg>
                        Bluetooth
                    </span>
                    <div class="banner-preview">
                        <img id="banner-device-image" src="assets/pixoo.png" alt="Device Preview">
                    </div>
                    <div class="banner-info">
                        <div class="banner-label">Active Device</div>
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:4px;">
                            <h2 id="banner-device-name" style="margin-bottom:0; font-size:18px;">No Connected Screen</h2>
                        </div>
                        <div class="banner-specs">
                            <span style="display: none;">Target: <b id="banner-device-mac">-</b></span>
                            <span>Resolution: <b id="banner-device-res">16x16</b></span>
                            <span>Speaker: <b id="banner-device-speaker">No</b></span>
                        </div>
                    </div>
                </div>
                
                <div class="grid-layout">
                    <!-- Channels (Left: Channel selection) -->
                    <div class="card glass-card">
                        <div class="card-header">
                            <h3>Channels</h3>
                        </div>
                        <div class="card-body">
                            <div class="channel-grid">
                                <button class="channel-card active" data-channel="clock">
                                    <span class="channel-icon">
                                        <svg class="kare-icon" viewBox="0 0 16 16">
                                            <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
                                            <path d="M8,4 L8,8 L11,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        </svg>
                                    </span>
                                    <h4>Clock Mode</h4>
                                </button>
                                <button class="channel-card" data-channel="visualizer">
                                    <span class="channel-icon">
                                        <svg class="kare-icon" viewBox="0 0 16 16">
                                            <rect x="2" y="10" width="2" height="6"/>
                                            <rect x="6" y="4" width="2" height="12"/>
                                            <rect x="10" y="7" width="2" height="9"/>
                                            <rect x="14" y="2" width="2" height="14"/>
                                        </svg>
                                    </span>
                                    <h4>Music EQ</h4>
                                </button>
                                <button class="channel-card" data-channel="vj">
                                    <span class="channel-icon">
                                        <svg class="kare-icon" viewBox="0 0 16 16">
                                            <rect x="1" y="1" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                                            <rect x="4" y="4" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
                                            <rect x="7" y="7" width="2" height="2" fill="currentColor"/>
                                        </svg>
                                    </span>
                                    <h4>VJ Effects</h4>
                                </button>
                                <button class="channel-card" data-channel="design">
                                    <span class="channel-icon">
                                        <svg class="kare-icon" viewBox="0 0 16 16">
                                            <path d="M2,4 C2,2 5,1 8,1 C12,1 15,3 15,7 C15,11 11,14 7,14 C5.5,14 4.5,13.5 3.5,13.5 C2.5,13.5 1,15 1,13 C1,11.5 1,9.5 2,7 C2,5.5 2,5 2,4 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                                            <circle cx="5" cy="4" r="1"/>
                                            <circle cx="9" cy="4" r="1"/>
                                            <circle cx="11" cy="7" r="1"/>
                                            <circle cx="8" cy="10" r="1"/>
                                        </svg>
                                    </span>
                                    <h4>Custom Art</h4>
                                </button>
                                <button class="channel-card" data-channel="ambient">
                                    <span class="channel-icon">
                                        <svg class="kare-icon" viewBox="0 0 16 16">
                                            <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
                                            <circle cx="8" cy="8" r="2" fill="currentColor"/>
                                        </svg>
                                    </span>
                                    <h4>Ambient</h4>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Channel sub-selection panels (Right: Dynamic options) -->
                    <div class="card glass-card">
                        <div class="card-header">
                            <h3 id="channel-options-title">Clock Mode Options</h3>
                        </div>
                        <div class="card-body">
                            <div class="channel-panels">
                                <!-- Clock faces (real built-in dial types) -->
                                <div class="channel-panel active" id="panel-clock">
                                    <div class="selector-grid" id="clock-faces-grid"></div>
                                    <!-- Clock Color Picker -->
                                    <div style="margin-top: 16px; display: flex; align-items: center; gap: 10px;">
                                        <label class="form-label" style="margin-bottom: 0; font-size: 12px; font-weight: 600; color: var(--text-muted);">Clock Color:</label>
                                        <input type="color" id="clock-color-input" value="#ffffff" style="background: none; border: none; width: 44px; height: 28px; cursor: pointer; padding: 0;">
                                    </div>
                                </div>
                                <!-- Music EQ / visualizer patterns -->
                                <div class="channel-panel" id="panel-visualizer">
                                    <div class="selector-grid" id="eq-visualizer-grid"></div>
                                </div>
                                <!-- VJ effects -->
                                <div class="channel-panel" id="panel-vj">
                                    <div class="selector-grid" id="vj-effects-grid"></div>
                                </div>
                                <!-- Custom art -->
                                <div class="channel-panel" id="panel-design">
                                    <p class="panel-hint" style="margin-top: 0; margin-bottom: 12px;">Display your own custom art/GIFs on the device's "Custom" channel.</p>
                                    <div class="custom-art-upload-section" style="display:flex; flex-direction:column; gap:12px; max-width:100%;">
                                        <div style="display:flex; gap:10px; align-items:center;">
                                            <button id="browse-custom-art-btn" class="glow-btn compact" style="margin:0; white-space:nowrap;">Browse File...</button>
                                            <input type="text" id="custom-art-path-input" placeholder="No file selected" class="text-input" style="flex:1;" readonly>
                                        </div>
                                        
                                        <!-- Last 5 Selected Items filmstrip preview -->
                                        <div id="custom-art-history-container" style="display:flex; flex-direction:column; gap:6px; padding:10px; background:rgba(0,0,0,0.2); border-radius:6px; border:1px solid rgba(255,255,255,0.05); box-sizing:border-box; width:100%;">
                                            <label class="form-label" style="font-size:11px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:2px;">Last 5 Selected Items:</label>
                                            <div id="custom-art-history-filmstrip" style="display:flex; gap:8px; overflow-x:auto; padding:2px; min-height:60px;">
                                                <div class="empty-list" style="font-size:11px;">No design pushed yet.</div>
                                            </div>
                                        </div>
                                        
                                        <!-- Gallery Cache Selection Grid -->
                                        <div class="gallery-cache-selector" style="margin-top: 4px;">
                                            <label class="form-label" style="font-size:11px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:6px;">Select from Gallery Cache:</label>
                                            <div class="selector-grid" id="custom-art-cache-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap:8px; max-height: 120px; overflow-y: auto; padding: 6px; background: rgba(0,0,0,0.25); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); box-sizing:border-box; width:100%;">
                                                <div class="empty-list" style="grid-column: 1/-1;">No cached gallery files.</div>
                                            </div>
                                        </div>

                                        <button id="apply-custom-art-btn" class="glow-btn" style="margin:0;">Push to Device</button>
                                    </div>
                                </div>
                                <!-- Ambient light (now a channel selection) -->
                                <div class="channel-panel" id="panel-ambient">
                                    <div class="ambient-controls">
                                        <div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
                                            <div class="form-group" style="margin-top: 4px; margin-bottom: 4px; width: 100%;">
                                                <label class="form-label" style="font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom: 6px;">Ambient Effect Mode:</label>
                                                <div class="selector-grid" id="ambient-mode-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; width: 100%;"></div>
                                            </div>
                                            
                                            <!-- Color Picker and Swatches Grid -->
                                            <div class="ambient-swatches-grid" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:8px;">
                                                <div class="color-picker-wrapper" style="position:relative; width:28px; height:28px; border-radius:50%; overflow:hidden; border:2px solid rgba(255,255,255,0.1); cursor:pointer; flex-shrink:0;">
                                                    <input type="color" id="ambient-color-input" value="#00ffcc" style="position:absolute; top:-4px; left:-4px; width:36px; height:36px; border:none; background:none; cursor:pointer; padding:0;">
                                                </div>
                                                <button class="ambient-swatch" style="background:#ff0000;" data-color="#ff0000" title="Red"></button>
                                                <button class="ambient-swatch" style="background:#00ff00;" data-color="#00ff00" title="Green"></button>
                                                <button class="ambient-swatch" style="background:#0000ff;" data-color="#0000ff" title="Blue"></button>
                                                <button class="ambient-swatch" style="background:#ffff00;" data-color="#ffff00" title="Yellow"></button>
                                                <button class="ambient-swatch" style="background:#ff7700;" data-color="#ff7700" title="Orange"></button>
                                                <button class="ambient-swatch" style="background:#00ffcc;" data-color="#00ffcc" title="Cyan"></button>
                                                <button class="ambient-swatch" style="background:#ff00ff;" data-color="#ff00ff" title="Magenta"></button>
                                                <button class="ambient-swatch" style="background:#ffffff;" data-color="#ffffff" title="White"></button>
                                                <span style="font-size:11px; color:var(--text-muted); margin-left:4px;">Pick Custom Color</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- TAB 2: VIRTUAL DISPLAY WALL (Free-Form Arranger) -->
            <section id="display-wall" class="tab-content">
                
                <div class="grid-layout vertical">
                    <!-- Layout Config -->
                    <div class="card glass-card">
                        <div class="card-header flex-header">
                            <h3>Layout &amp; Presets</h3>
                            <div class="header-actions">
                                <button id="save-preset-btn" class="glow-btn compact" style="background:transparent; border:1px solid var(--secondary); color:var(--text-main); box-shadow:none; display:inline-flex; align-items:center;">
                                    <svg class="kare-icon" viewBox="0 0 16 16" style="margin-right: 4px; width:12px; height:12px;">
                                        <path d="M2,2 L11,2 L14,5 L14,14 L2,14 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                                        <rect x="5" y="2" width="5" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
                                        <rect x="7" y="3" width="1" height="2"/>
                                        <rect x="4" y="9" width="8" height="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                                    </svg>
                                    Save Preset
                                </button>
                                <select id="presets-select" class="custom-select small">
                                    <option value="">Load Preset...</option>
                                    <option value="wall_2x2">2x2 Matrix Wall</option>
                                    <option value="strip_1x2">1x2 Wide Panel</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Free-form Arranger Canvas -->
                    <div class="card glass-card arranger-card">
                        <div class="card-header flex-header">
                            <h3>Canvas</h3>
                            <div class="header-actions">
                                <button id="add-arranger-screen-btn" class="glow-btn compact" style="background:transparent; border:1px solid var(--secondary); color:var(--text-main); box-shadow:none;">Add Screen</button>
                                <button id="clear-arranger-btn" class="glow-btn compact" style="background:transparent; border:1px solid var(--secondary); color:var(--text-main); box-shadow:none;">Clear Canvas</button>
                            </div>
                        </div>
                        <div class="card-body container-body" style="padding: 0;">
                            <div class="arranger-workspace-free" id="arranger-canvas"></div>
                        </div>
                    </div>
                    
                    <!-- Asset Push -->
                    <div class="card glass-card" style="width: 100%; box-sizing: border-box;">
                        <div class="card-header">
                            <h3>Split &amp; Sync GIF</h3>
                        </div>
                        <div class="card-body" style="display:flex; flex-direction:column; gap:12px; width:100%; box-sizing:border-box;">
                            <div style="display:flex; gap:10px; width:100%; align-items:center;">
                                <button id="browse-wall-art-btn" class="glow-btn compact" style="margin:0; white-space:nowrap;">Browse...</button>
                                <div class="file-uploader" style="flex:1;">
                                    <input type="text" id="file-path-input" placeholder="No file selected" class="text-input" style="width:100%; box-sizing:border-box;" readonly>
                                </div>
                                <button id="apply-wall-art" class="glow-btn" style="margin:0; white-space:nowrap;">Split &amp; Push</button>
                            </div>
                            <div id="file-preview-container" style="display:none; align-items:center; justify-content:center; padding:10px; background:rgba(0,0,0,0.2); border-radius:6px; border:1px solid rgba(255,255,255,0.05); text-align:center;">
                                <img id="file-preview-img" src="" alt="Local Preview" style="max-width:120px; max-height:120px; border-radius:4px; object-fit:contain; border:1px solid rgba(255,255,255,0.1);">
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- TAB 3: BATCH MONTHLY BEST WITH PREVIEWS -->
            <section id="monthly-best" class="tab-content"></section>
            
            <!-- TAB 4: ADVANCED MEDIA & DATA SOURCES (EQ Animation Previews) -->
            <section id="data-sources" class="tab-content"></section>
            
            <!-- TAB 5: CREDENTIALS & BLE CONFIG SETTINGS -->
            <section id="settings" class="tab-content"></section>
            
        </main>
    </div>
    
    <!-- Notification Overlay -->
    <div id="toast" class="toast"></div>
    
    <script src="templates.js"></script>
    <script src="app.js"></script>
    <script src="channels.js"></script>
    <script src="widgets.js"></script>
    <script src="settings.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
