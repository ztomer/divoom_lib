name: tests

on:
  push:
  pull_request:

jobs:
  test:
    # macOS so clang builds the dylib and the native (C) encoder tests actually run.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pillow

      - name: Build native dylib
        run: bash scripts/build_libdivoom.sh

      - name: Run tests (C + Python encoder parity enforced via dual-impl suite)
        run: python3 -m pytest -q
